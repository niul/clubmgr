# Test configuration for clubmgr-data using PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/clubmgr
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=USERNAME
spring.datasource.password=PASSWORD

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Disable Hibernate Cache for tests
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.internal.NoCachingRegionFactory

spring.main.allow-bean-definition-overriding=true

# Cache
spring.cache.type=none

# Jsoup
jsoup.timeout=30000

# Logging
logging.level.com.niulbird=debug
logging.level.org.springframework=error
logging.level.org.hibernate=error
team.regex=Bombastic
